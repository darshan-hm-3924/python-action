name: "python lint"
description: "install python and run linter"

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install flake8
      run: pip install flake8
      shell: bash

    - name: Run linter
      run: flake8 .
      shell: bash